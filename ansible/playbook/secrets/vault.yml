- name: Install vault
  hosts: vault
  gather_facts: true
  roles:
    - role: reneruprecht.general
    - role: prometheus.prometheus.node_exporter
    - role: ansible-community.ansible-vault
      become: true
    - role: reneruprecht.minio
    - role: grafana.grafana.alloy
      become: true
  post_tasks:
    - name: Set vault environment
      become: true
      become_user: "vault"
      ansible.builtin.lineinfile:
        path: "~/.bashrc"
        line: "export VAULT_ADDR=https://{{ inventory_hostname }}:8200"
        state: present

    - name: Create log group
      become: true
      ansible.builtin.group:
        name: logs
        state: present

    - name: Add user to logs group
      become: true
      ansible.builtin.user:
        name: "{{ item }}"
        append: true
        groups:
          - logs
      loop:
        - "alloy"
        - "vault"

    - name: Setup backup to s3
      ansible.builtin.include_tasks:
        file: ./tasks/vault-backup-setup.yml
