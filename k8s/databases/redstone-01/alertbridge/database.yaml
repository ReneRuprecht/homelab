apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: alertbridge-postgres
  namespace: alertbridge
spec:
  description: "Alertbridge DB"
  instances: 2
  startDelay: 300
  stopDelay: 300

  bootstrap:
    initdb:
      database: alerts

  storage:
    storageClass: longhorn
    size: 1Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "200m"

