---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-cert
  namespace: harbor
spec:
  secretName: harbor-cert-tls
  commonName: harbor.bluecore
  dnsNames:
    - harbor.bluecore
    - core.harbor.bluecore
  issuerRef:
    name: pki-int-bluecore
    kind: ClusterIssuer
  privateKey:
    algorithm: RSA
    size: 4096
