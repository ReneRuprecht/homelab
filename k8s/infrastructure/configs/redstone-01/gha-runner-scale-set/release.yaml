apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-homelab
  namespace: arc-runners
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-controller
        namespace: arc-systems
      interval: 12h
  values:
    githubConfigUrl: "https://github.com/reneruprecht/homelab"

    githubConfigSecret: gha-runner-scale-set-homelab
    minRunners: 2
    maxRunners: 4
    scaleSetLabels:
      - homelab
    containerMode:
      type: "dind"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-gha-testing
  namespace: arc-runners
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-controller
        namespace: arc-systems
      interval: 12h
  values:
    githubConfigUrl: "https://github.com/reneruprecht/gha-testing"

    githubConfigSecret: gha-runner-scale-set-homelab
    minRunners: 1
    maxRunners: 3
    scaleSetLabels:
      - homelab
    containerMode:
      type: "dind"

    template:
      spec:
        initContainers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --insecure-registry core.harbor.bluecore
            - --host=unix:///var/run/docker.sock
            - --group=$(DOCKER_GROUP_GID)
          env:
            - name: DOCKER_GROUP_GID
              value: "123"
          securityContext:
            privileged: true
          restartPolicy: Always
          startupProbe:
            exec:
              command:
                - docker
                - info
            initialDelaySeconds: 0
            failureThreshold: 24
            periodSeconds: 5
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
            - name: harbor-ca
              mountPath: /etc/docker/certs.d/core.harbor.bluecore/ca.crt
              subPath: ca.crt
        volumes:
          - name: harbor-ca
            secret:
              secretName: harbor-ca
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/bin/sh", "-c", "sudo update-ca-certificates && /home/runner/run.sh"]
            volumeMounts:
              - name: harbor-ca
                mountPath: /usr/local/share/ca-certificates/harbor.crt
                subPath: ca.crt
