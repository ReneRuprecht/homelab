---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: gitops
spec:
  interval: 5m
  chart:
    spec:
      chart: argo-cd
      version: "7.8.3"
      sourceRef:
        kind: HelmRepository
        name: argocd
        namespace: gitops
      interval: 12h
  values:
    redis-ha:
      enabled: true
    controller:
      replicas: 1
    server:
      autoscaling:
        enabled: true
        minReplicas: 2
    repoServer:
      autoscaling:
        enabled: true
        minReplicas: 2
    applicationSet:
      replicas: 2
