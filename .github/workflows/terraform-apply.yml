name: Terraform apply

env:
  TF_VERSION: 1.12.2
  NETBOX_SERVER_URL: ${{ secrets.NETBOX_URL }}
  NETBOX_API_TOKEN: ${{ secrets.NETBOX_TOKEN }}
  TF_VAR_vm_user: ${{ secrets.VM_USER }}
  TF_VAR_vm_ssh_keys: ${{ secrets.VM_KEYS }}
  PM_API_URL: ${{ secrets.PM_API_URL }}
  PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
  PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  TF_VAR_vault_address: ${{ secrets.VAULT_ADDRESS }}
  TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
  TF_VAR_k8s_ca_cert: ${{ secrets.K8S_CA_CERT }}
  TF_VAR_k8s_host: ${{ secrets.K8S_HOST }}
  TF_VAR_dns_update_server: ${{ secrets.DNS_UPDATE_SERVER }}
  TF_VAR_dns_update_key_name: ${{ secrets.DNS_UPDATE_KEY_NAME }}
  TF_VAR_dns_update_key_algorithm: ${{ secrets.DNS_UPDATE_KEY_ALGORITHM }}
  TF_VAR_dns_update_key_secret: ${{ secrets.DNS_UPDATE_KEY_SECRET }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  VAULT_CA_B64: ${{ secrets.VAULT_CA_B64 }}

on:
  workflow_call:
    inputs:
      dirs:
        required: true
        type: string

jobs:
  apply:
    if: ${{ inputs.dirs != '[]' }}
    runs-on: homelab
    container:
      image: reneruprecht/ci-node24
    strategy:
      matrix:
        env_name: ${{ fromJSON(inputs.dirs) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup vars
        id: vars
        run: |
          ENV_NAME=$(echo "${{ matrix.env_name }}" | cut -d'/' -f1)
          {
            echo "env_name<<EOF"
            echo "${ENV_NAME}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          COMPONENT=$(echo "${{ matrix.env_name }}" | cut -d'/' -f2)
          {
            echo "component<<EOF"
            echo "${COMPONENT}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          WORKDIR="terraform/environments/$ENV_NAME/$COMPONENT"
          {
            echo "workdir<<EOF"
            echo "$WORKDIR"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Vault CA
        working-directory: ${{ steps.vars.outputs.workdir }}
        run: |
          echo "$VAULT_CA_B64" | base64 -d > vault.ca

      - name: Terraform Init
        env:
          VAULT_CACERT: vault.ca
        working-directory: ${{ steps.vars.outputs.workdir }}
        run: |
          terraform init -backend-config="access_key=$AWS_ACCESS_KEY_ID" -backend-config="secret_key=$AWS_SECRET_ACCESS_KEY" > /dev/null

      - name: Terraform apply
        working-directory: ${{ steps.vars.outputs.workdir }}
        env:
          VAULT_CACERT: vault.ca
        run: |
          terraform apply -auto-approve
